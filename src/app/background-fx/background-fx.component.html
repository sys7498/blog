<!-- 배경 캔버스 (콘텐츠 뒤, 클릭 통과) -->
<canvas #bgCanvas class="bg-canvas"></canvas>

<!-- 설정 토글 버튼 (이스터에그) -->
<button class="fx-toggle" (click)="togglePanel()" [class.active]="panelOpen" aria-label="background settings">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
    stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="3" />
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
  </svg>
</button>

<!-- 설정 패널 -->
<div class="fx-panel" *ngIf="panelOpen">
  <div class="fx-head">
    <span>background</span>
    <button class="fx-close" (click)="togglePanel()" aria-label="close">✕</button>
  </div>

  <label class="fx-row fx-check">
    <span>Show</span>
    <input type="checkbox" [checked]="settings.enabled" (change)="setEnabled($event)" />
  </label>

  <label class="fx-row">
    <span>Count <b>{{ settings.count }}</b></span>
    <input type="range" min="0" max="120" step="1" [value]="settings.count" (input)="setCount($event)" />
  </label>

  <label class="fx-row">
    <span>Speed <b>{{ settings.speed.toFixed(1) }}×</b></span>
    <input type="range" min="0" max="3" step="0.1" [value]="settings.speed" (input)="setSpeed($event)" />
  </label>

  <label class="fx-row">
    <span>Size <b>{{ settings.size.toFixed(1) }}×</b></span>
    <input type="range" min="0.3" max="3" step="0.1" [value]="settings.size" (input)="setSize($event)" />
  </label>

  <label class="fx-row">
    <span>Opacity <b>{{ settings.opacity.toFixed(2) }}</b></span>
    <input type="range" min="0.02" max="1" step="0.01" [value]="settings.opacity" (input)="setOpacity($event)" />
  </label>

  <label class="fx-row fx-check">
    <span>Wireframe</span>
    <input type="checkbox" [checked]="settings.wireframe" (change)="setWireframe($event)" />
  </label>

  <label class="fx-row fx-check">
    <span>Colorful</span>
    <input type="checkbox" [checked]="settings.colorful" (change)="setColorful($event)" />
  </label>

  <div class="fx-buttons">
    <button (click)="shuffle()">Shuffle</button>
    <button (click)="reset()">Reset</button>
  </div>
</div>
