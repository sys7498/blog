<div class="page">
  <div class="page-inner editor-page">
    <div class="editor-head">
      <div>
        <div class="eyebrow">markdown editor</div>
        <h1 class="page-title">Post Editor</h1>
        <p class="page-sub">
          Write or edit posts in Markdown. Download the generated .md file and add it under
          <code>src/assets/posts</code> to publish.
        </p>
      </div>
      <button class="ghost-btn" type="button" (click)="backToPosts()">Posts</button>
    </div>

    <div class="editor-grid">
      <label>
        Existing post
        <select [(ngModel)]="selectedSlug" (change)="loadSelected()">
          <option value="">New post</option>
          <option *ngFor="let post of posts" [value]="post.slug">
            {{ post.date }} · {{ post.title }}
          </option>
        </select>
      </label>

      <label>
        Title
        <input [(ngModel)]="title" (ngModelChange)="syncSlugFromTitle()" />
      </label>

      <label>
        Date
        <input [(ngModel)]="date" (ngModelChange)="saveDraft()" />
      </label>

      <label>
        Slug / file name
        <input [(ngModel)]="slug" (ngModelChange)="saveDraft()" />
      </label>
    </div>

    <label class="summary-field">
      Summary
      <input [(ngModel)]="summary" (ngModelChange)="saveDraft()" />
    </label>

    <textarea #markdownInput></textarea>

    <div class="editor-actions">
      <button class="primary-btn" type="button" (click)="downloadMarkdown()">Download .md</button>
      <button class="ghost-btn" type="button" (click)="copyMarkdown()">Copy Markdown</button>
      <button class="ghost-btn" type="button" (click)="newPost()">New</button>
      <button class="ghost-btn danger" type="button" (click)="clearDraft()">Clear Draft</button>
      <span class="save-state" *ngIf="savedAt">Draft saved {{ savedAt }}</span>
    </div>
  </div>
</div>
