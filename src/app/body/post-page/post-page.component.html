<div class="page">
  <div class="page-inner">
    <h1 class="page-title">Posts</h1>
    <p class="page-sub">A lab notebook — informal notes, write-ups, and coffee tangents.</p>

    <div class="list">
      <div class="list-item" *ngFor="let p of posts" (click)="open(p.slug)">
        <div class="item-meta">{{ p.date }}</div>
        <div class="item-title">{{ p.title }}</div>
        <div class="item-summary" *ngIf="p.summary">{{ p.summary }}</div>
      </div>
    </div>
  </div>
</div>
